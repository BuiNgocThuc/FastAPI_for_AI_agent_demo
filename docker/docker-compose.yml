version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1  # Bản Postgres build sẵn extension vector chuẩn hóa
    container_name: lecton_postgres_local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin@123
      POSTGRES_DB: lecton_ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lecton_ai_db"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: